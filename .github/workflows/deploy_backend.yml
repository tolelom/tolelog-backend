name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Go 설정
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: 의존성 설치
        run: go mod download

      - name: 빌드
        run: go build -v ./...

      - name: 테스트
        run: go test -v ./...

  deploy:
    needs: build-test
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Go 설정
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: 배포용 바이너리 빌드
        run: GOOS=darwin GOARCH=arm64 go build -o tolelom-api ./cmd/server

      - name: 기존 프로세스 종료
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            pkill tolelom-api || true

      - name: 서버에 파일 복사
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "tolelom-api"
          target: "/Users/tolelom/server/apps/tolelom-api"

      - name: 서버에서 프로세스 시작
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/server/apps/tolelom-api
            chmod +x tolelom-api
            nohup ./tolelom-api > ./logs/stdout.log 2> ./logs/stderr.log &