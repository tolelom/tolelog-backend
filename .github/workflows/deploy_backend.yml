name: Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Go 설정
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Go 설정
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: 테스트 실행 (커버리지 포함)
        run: go test -v -coverprofile=coverage.out -covermode=atomic ./...

      - name: 커버리지 요약 생성
        run: |
          echo '## Backend 테스트 커버리지 리포트' > coverage-summary.md
          echo '' >> coverage-summary.md
          echo '```' >> coverage-summary.md
          go tool cover -func=coverage.out >> coverage-summary.md
          echo '```' >> coverage-summary.md
          echo '' >> coverage-summary.md
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "**총 커버리지: ${TOTAL}**" >> coverage-summary.md

      - name: PR에 커버리지 코멘트
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: backend-coverage
          path: coverage-summary.md

      - name: 커버리지 리포트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.out

  build-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Go 설정
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: 바이너리 빌드
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o server ./cmd/server

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker 이미지 빌드 & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/tolelom/tolelom-api:latest
            ghcr.io/tolelom/tolelom-api:${{ github.sha }}
          platforms: linux/arm64

      - name: 서버에 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            export PATH=$PATH:/usr/local/bin:/opt/homebrew/bin:$HOME/.docker/bin
            cd ~/server
            docker compose pull tolelom-api
            docker compose up -d tolelom-api
